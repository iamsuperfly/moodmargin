kind = "web"
previewPath = "/"
title = "MoodMargin"
version = "1.0.0"
id = "artifacts/moodmargin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18375

[services.development]
run = "pnpm --filter @workspace/moodmargin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moodmargin", "run", "build" ]
publicDir = "artifacts/moodmargin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18375"
BASE_PATH = "/"
